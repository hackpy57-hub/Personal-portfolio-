<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; border: none; outline: none; }
        :root { --bg-color: #081b29; --second-bg-color: #112e42; --text-color: #ededed; --main-color: #00abf0; }
        body { background: var(--bg-color); color: var(--text-color); overflow-x: hidden; }
        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 10%; background: rgba(8, 27, 41, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 25px; color: var(--text-color); font-weight: 700; }
        .navbar a { font-size: 18px; color: var(--text-color); font-weight: 500; margin-left: 35px; transition: .3s; }
        .navbar a:hover, .navbar a.active { color: var(--main-color); }
        .home { height: 100vh; display: flex; align-items: center; padding: 0 10%; justify-content: space-between; }
        .home-content { max-width: 600px; }
        .home-content h1 { font-size: 56px; font-weight: 700; line-height: 1.2; }
        .home-content h3 { font-size: 32px; font-weight: 700; color: var(--main-color); }
        .home-content p { font-size: 16px; margin: 20px 0 40px; }
        .social-media a { display: inline-flex; justify-content: center; align-items: center; width: 40px; height: 40px; border: 2px solid var(--main-color); border-radius: 50%; color: var(--main-color); margin: 0 15px 30px 0; transition: .5s; }
        .social-media a:hover { background: var(--main-color); color: var(--bg-color); box-shadow: 0 0 20px var(--main-color); }
        .btn { display: inline-block; padding: 12px 28px; background: var(--main-color); border-radius: 40px; color: var(--bg-color); font-weight: 600; box-shadow: 0 0 10px var(--main-color); transition: .3s; }
        .btn:hover { box-shadow: none; }
        .home-img .img-box { width: 32vw; height: 32vw; border-radius: 50%; background: linear-gradient(var(--main-color), transparent); display: flex; justify-content: center; align-items: center; }
        .img-box img { width: 95%; border-radius: 50%; border: 5px solid var(--bg-color); }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Portfolio.</a>
        <nav class="navbar">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="skills.html">Skills</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="home">
        <div class="home-content">
            <h3>Hello, I'm</h3>
            <h1>Haroon</h1>
            <h3>And I'm a <span class="typing-text"></span></h3>
            <p>I am a Software Engineer and Web Designer specializing in modern UI/UX and Cybersecurity.</p>
            <div class="social-media">
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
            </div>
            <a href="#" class="btn">Download CV</a>
        </div>
        <div class="home-img"><div class="img-box"><img src="https://via.placeholder.com/400" alt="Profile"></div></div>
    </section>
    <script>
        const typingText = document.querySelector(".typing-text");
        const words = ["Web Developer", "Software Engineer", "Cyber Expert"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        function type() {
            const currentWord = words[wordIndex];
            typingText.textContent = isDeleting ? currentWord.substring(0, charIndex - 1) : currentWord.substring(0, charIndex + 1);
            charIndex = isDeleting ? charIndex - 1 : charIndex + 1;
            let typeSpeed = isDeleting ? 100 : 200;
            if (!isDeleting && charIndex === currentWord.length) { isDeleting = true; typeSpeed = 2000; }
            else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % words.length; typeSpeed = 500; }
            setTimeout(type, typeSpeed);
        }
        document.addEventListener("DOMContentLoaded", type);
    </script>
</body>
  </html>
