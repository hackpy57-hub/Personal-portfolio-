<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; border: none; outline: none; }
        :root { --bg-color: #081b29; --second-bg-color: #112e42; --text-color: #ededed; --main-color: #00abf0; }
        body { background: var(--bg-color); color: var(--text-color); }
        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 10%; background: rgba(8, 27, 41, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 25px; color: var(--text-color); font-weight: 700; }
        .navbar a { font-size: 18px; color: var(--text-color); font-weight: 500; margin-left: 35px; transition: .3s; }
        .navbar a:hover, .navbar a.active { color: var(--main-color); }
        .services { min-height: 100vh; padding: 120px 10% 50px; }
        .heading { font-size: 50px; text-align: center; margin-bottom: 3rem; }
        .heading span { color: var(--main-color); }
        .services-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
        .services-box { background: var(--second-bg-color); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid transparent; transition: .5s; }
        .services-box:hover { border-color: var(--main-color); transform: scale(1.02); box-shadow: 0 0 15px var(--main-color); }
        .services-box i { font-size: 50px; color: var(--main-color); margin-bottom: 15px; }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Portfolio.</a>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="skills.html">Skills</a>
            <a href="services.html" class="active">Services</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="services">
        <h2 class="heading">Our <span>Services</span></h2>
        <div class="services-container">
            <div class="services-box">
                <i class="fa-solid fa-code"></i>
                <h3>Web Dev</h3>
                <p>Clean and modern websites.</p>
            </div>
            <div class="services-box">
                <i class="fa-solid fa-shield-halved"></i>
                <h3>Cyber Security</h3>
                <p>Securing your network.</p>
            </div>
        </div>
    </section>
</body>
</html>
