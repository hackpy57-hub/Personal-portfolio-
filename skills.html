<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; border: none; outline: none; }
        :root { --bg-color: #081b29; --second-bg-color: #112e42; --text-color: #ededed; --main-color: #00abf0; }
        body { background: var(--bg-color); color: var(--text-color); }
        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 10%; background: rgba(8, 27, 41, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 25px; color: var(--text-color); font-weight: 700; }
        .navbar a { font-size: 18px; color: var(--text-color); font-weight: 500; margin-left: 35px; transition: .3s; }
        .navbar a:hover, .navbar a.active { color: var(--main-color); }
        .skills { min-height: 100vh; padding: 120px 10% 50px; }
        .heading { font-size: 50px; text-align: center; margin-bottom: 3rem; }
        .heading span { color: var(--main-color); }
        .skills-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .skills-box { background: var(--second-bg-color); padding: 20px; border-radius: 10px; }
        .progress-bar { width: 100%; height: 10px; background: #081b29; border-radius: 10px; margin: 10px 0 20px; overflow: hidden; }
        .progress-bar span { display: block; height: 100%; background: var(--main-color); animation: fill 2s ease forwards; width: 0; }
        @keyframes fill { from { width: 0; } to { width: var(--w); } }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Portfolio.</a>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="skills.html" class="active">Skills</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="skills">
        <h2 class="heading">My <span>Skills</span></h2>
        <div class="skills-container">
            <div class="skills-box">
                <h3>HTML</h3>
                <div class="progress-bar"><span style="--w: 90%;"></span></div>
                <h3>CSS</h3>
                <div class="progress-bar"><span style="--w: 80%;"></span></div>
                <h3>JavaScript</h3>
                <div class="progress-bar"><span style="--w: 70%;"></span></div>
            </div>
        </div>
    </section>
</body>
                                            </html>
