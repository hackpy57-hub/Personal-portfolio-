<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-decoration: none; border: none; outline: none; }
        :root { --bg-color: #081b29; --second-bg-color: #112e42; --text-color: #ededed; --main-color: #00abf0; }
        body { background: var(--bg-color); color: var(--text-color); }
        .header { position: fixed; top: 0; left: 0; width: 100%; padding: 20px 10%; background: rgba(8, 27, 41, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 25px; color: var(--text-color); font-weight: 700; }
        .navbar a { font-size: 18px; color: var(--text-color); font-weight: 500; margin-left: 35px; transition: .3s; }
        .navbar a:hover, .navbar a.active { color: var(--main-color); }
        .contact { min-height: 100vh; padding: 120px 10% 50px; display: flex; flex-direction: column; align-items: center; }
        .heading { font-size: 50px; margin-bottom: 2rem; }
        .heading span { color: var(--main-color); }
        .contact-form { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .contact-form input, .contact-form textarea { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; color: #fff; margin-bottom: 15px; font-size: 16px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--main-color); color: var(--bg-color); font-weight: 700; border-radius: 10px; cursor: pointer; box-shadow: 0 0 10px var(--main-color); }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">Portfolio.</a>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="skills.html">Skills</a>
            <a href="services.html">Services</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>
    <section class="contact">
        <h2 class="heading">Contact <span>Me</span></h2>
        <form class="contact-form">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </section>
</body>
</html>
